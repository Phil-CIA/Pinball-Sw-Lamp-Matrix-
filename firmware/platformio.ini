[platformio]
default_envs = esp32c6_espidf

[env]
platform = espressif32
monitor_speed = 115200

; IMPORTANT:
; Set this to the correct PlatformIO board ID for your ESP32-C6 dev kit.
; Verified 2026-04-06: `esp32-c6-devkitm-1` currently supports `espidf` in PlatformIO.
board = esp32-c6-devkitm-1

[env:esp32c6_espidf]
framework = espidf
platform_packages =
  platformio/framework-espidf@3.50201.240515
build_flags =
  -D PINBALL_MATRIX_BRINGUP=1

; Add an Arduino environment later if/when PlatformIO enables Arduino support
; for this ESP32-C6 board definition.